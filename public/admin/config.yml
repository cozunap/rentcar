backend:
  name: github
  repo: cozunap/rentcar
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "cars"
    label: "Vehículos (Flota)"
    folder: "src/content/cars"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nombre", name: "title", widget: "string"}
      - {label: "Categoría", name: "category", widget: "select", options: ["SUV", "Deportivo Exótico", "Sedán Ejecutivo", "Convertible"]}
      - {label: "Precio Diario ($)", name: "price", widget: "number"}
      - {label: "Asientos", name: "seats", widget: "number", default: 4}
      - {label: "Equipaje", name: "luggage", widget: "number", default: 2}
      - {label: "Transmisión", name: "transmission", widget: "select", options: ["Auto", "Manual"]}
      - {label: "Imagen", name: "image", widget: "image", required: false}
      - {label: "Descripción Breve", name: "description", widget: "text"}

  - name: "pages"
    label: "Páginas (Textos del Sitio)"
    files:
      - label: "Página de Inicio (Home)"
        name: "home"
        file: "src/content/pages/home.json"
        fields:
          - {label: "Título Principal Hero", name: "hero_title", widget: "string"}
          - {label: "Subtítulo Hero", name: "hero_subtitle", widget: "string"}
          - {label: "Descripción Hero", name: "hero_description", widget: "text"}
          - {label: "Título Nosotros", name: "about_title", widget: "string"}
          - {label: "Texto Nosotros", name: "about_text", widget: "text"}
          
      - label: "Nuestra Flota (Fleet)"
        name: "fleet"
        file: "src/content/pages/fleet.json"
        fields:
          - {label: "Título Principal", name: "page_title", widget: "string"}
          - {label: "Descripción", name: "page_description", widget: "text"}
          
      - label: "Servicios VIP (Services)"
        name: "services"
        file: "src/content/pages/services.json"
        fields:
          - {label: "Título Principal", name: "page_title", widget: "string"}
          - {label: "Descripción", name: "page_description", widget: "text"}
          
      - label: "Contacto VIP (Contact)"
        name: "contact"
        file: "src/content/pages/contact.json"
        fields:
          - {label: "Título Principal", name: "page_title", widget: "string"}
          - {label: "Descripción", name: "page_description", widget: "text"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Teléfono", name: "phone", widget: "string"}
          
      - label: "Panel de Reserva (Dashboard)"
        name: "dashboard"
        file: "src/content/pages/dashboard.json"
        fields:
          - {label: "Título Principal", name: "page_title", widget: "string"}
          - {label: "Descripción", name: "page_description", widget: "text"}
          
      - label: "Membresía VIP (Membership)"
        name: "membership"
        file: "src/content/pages/membership.json"
        fields:
          - {label: "Título Principal", name: "title", widget: "string"}
          - {label: "Descripción", name: "description", widget: "text"}
